name: Build and Release

on:
  push:
    tags:
      - 'v*'

# Явно выдаем права на запись для создания релизов (Write permissions)
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Скачиваем исходный код репозитория из ветки
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Поднимаем официальное окружение MSYS2 и ставим чистый компилятор GCC
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc

    # 3. Собираем файл ресурсов (.rc) внутри оболочки MSYS2
    - name: Compile Resource File
      shell: msys2 {0}
      run: |
        windres resource.rc -O coff -o resource.res

    # 4. Компилируем monitor_hz.cpp в готовый статичный экзешник
    - name: Compile Executable
      shell: msys2 {0}
      run: |
        g++ -Os -s -static monitor_hz.cpp resource.res -o monitor_hz.exe -luser32

    # 5. Создаем релиз на GitHub и прикрепляем собранный файл
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: monitor_hz.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}